# Local development convenience. For the attested deployment, see
# docker-compose.phala.yml (Phala Cloud Intel TDX CVM).
services:
  be-data:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BE_DATA_PORT=8000
      - TEE_PROVIDER=auto # -> developer-key locally (no dstack socket)
      - BYBIT_API_BASE=https://api.bybit.com
      # - BYBIT_SYMBOL_MAP={"0x...":"ETHUSDT"}
      # - MANTLE_RPC_URL=https://rpc.mantle.xyz
      # - DEVELOPER_SIGNING_KEY=
    restart: unless-stopped
