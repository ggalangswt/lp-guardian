<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/webp" href="/logo-lp-guardian.webp" />
    <link rel="shortcut icon" type="image/webp" href="/logo-lp-guardian.webp" />
    <link rel="apple-touch-icon" href="/logo-lp-guardian.webp" />
    <meta name="theme-color" content="#fbfdff" />
    <title>LP Guardian — protect your LP position.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&family=Sora:wght@600;700;800&family=Source+Serif+4:ital,wght@1,500;1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      #lp-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #fbfdff;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.45s ease-out;
      }
      #lp-splash.lp-splash--exit {
        opacity: 0;
        pointer-events: none;
      }
      .lp-splash-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgb(219 234 255 / 0.9) 1px, transparent 1px),
          linear-gradient(90deg, rgb(219 234 255 / 0.9) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      .lp-splash-center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        user-select: none;
      }
      .lp-splash-wordmark {
        font-family: 'Sora', 'Inter', system-ui, sans-serif;
        font-size: clamp(3.2rem, 12vw, 7rem);
        color: #06284f;
        line-height: 0.96;
        letter-spacing: 0;
        margin-top: 0;
        animation: lp-splash-rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes lp-splash-rise {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .lp-splash-bar-wrap {
        width: 140px;
        height: 3px;
        background: #dfe8f5;
        border-radius: 999px;
        margin-top: 28px;
        overflow: hidden;
      }
      .lp-splash-bar {
        height: 100%;
        width: 0%;
        background: #0877ff;
        border-radius: 999px;
        animation: lp-splash-fill 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
      }
      @keyframes lp-splash-fill {
        from { width: 0%; }
        to   { width: 100%; }
      }
      .lp-splash-sub {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #42556d;
        margin-top: 14px;
        animation: lp-splash-rise 0.55s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
    </style>
  </head>
  <body>
    <div id="lp-splash" aria-hidden="true">
      <div class="lp-splash-grid"></div>
      <div class="lp-splash-center">
        <div class="lp-splash-wordmark">LP Guardian</div>
        <div class="lp-splash-bar-wrap">
          <div class="lp-splash-bar"></div>
        </div>
        <div class="lp-splash-sub">Initializing attested run...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
